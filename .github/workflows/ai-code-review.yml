name: Test and AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-code-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests and metadata validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python
        run: python -m py_compile ai_code_review.py test_ai_code_review.py

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run unit tests
        run: python -m unittest -v

      - name: Validate action metadata
        run: ruby -e 'require "yaml"; action = YAML.load_file("action.yml"); abort "not composite" unless action.dig("runs", "using") == "composite"'

  review:
    name: Review this pull request
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      HAS_AI_KEY: ${{ secrets.OPENAI_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' || secrets.GEMINI_API_KEY != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run local AI review action
        if: env.HAS_AI_KEY == 'true'
        uses: ./
        with:
          token_github: ${{ github.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          review_level: aggressive
          max_tokens_per_reviewer: "1200"

      - name: Explain skipped review
        if: env.HAS_AI_KEY != 'true'
        run: echo "AI review skipped because no provider API key is configured."
